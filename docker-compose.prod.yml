services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: farmers_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmers_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-farmers_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ../EluruRythuSampada_Shared_data/postgres:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d:ro
    networks:
      - farmers_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmers_user} -d ${POSTGRES_DB:-farmers_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmers_backend
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      # Application
      APP_NAME: ${APP_NAME:-Eluru Rythu Sampada - Farmers Marketplace}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "False"
      ENVIRONMENT: production
      
      # Server
      HOST: 0.0.0.0
      PORT: 8004
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmers_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-farmers_marketplace}
      DB_ECHO: "False"
      
      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # AWS S3 (Optional)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-}
      S3_BUCKET_BACKUPS: ${S3_BUCKET_BACKUPS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      # Email (Optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Eluru Rythu Sampada}
      
      # CAPTCHA (Optional)
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: "True"
      CONTACT_VENDOR_RATE_LIMIT: 10
      LOGIN_RATE_LIMIT: 5
      
      # CORS - Allow your domain
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_CREDENTIALS: "True"
      
      # File Upload
      MAX_IMAGE_SIZE_MB: 5
      ALLOWED_IMAGE_FORMATS: jpg,jpeg,png,webp
      
      # Logging
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log
      
      # Backup
      BACKUP_RETENTION_COUNT: 5
    
    volumes:
      - ./backend/app:/app/app:ro
      - ../EluruRythuSampada_Shared_data/storage:/app/storage
      - ../EluruRythuSampada_Shared_data/logs:/app/logs
    networks:
      - farmers_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""  # Empty for production - uses same-origin /api/
    container_name: farmers_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - farmers_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: farmers_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ../EluruRythuSampada_Shared_data/nginx_logs:/var/log/nginx
    networks:
      - farmers_network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: farmers_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - farmers_network

networks:
  farmers_network:
    driver: bridge
    name: farmers_network
