services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: shg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shg_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-shg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shg_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - shg_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shg_user} -d ${POSTGRES_DB:-shg_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shg_backend
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: ${APP_NAME:-SHG India Marketplace}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Server
      HOST: 0.0.0.0
      PORT: 8000
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-shg_user}:${POSTGRES_PASSWORD:-shg_password_123}@postgres:5432/${POSTGRES_DB:-shg_marketplace}
      DB_ECHO: ${DB_ECHO:-False}
      
      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production-min-32-chars}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # AWS S3 (Optional)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-shg-marketplace-images}
      S3_BUCKET_BACKUPS: ${S3_BUCKET_BACKUPS:-shg-marketplace-backups}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      # Email (Optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@shgmarketplace.gov.in}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SHG Marketplace}
      
      # CAPTCHA (Optional)
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-True}
      CONTACT_VENDOR_RATE_LIMIT: ${CONTACT_VENDOR_RATE_LIMIT:-10}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5}
      
      # CORS - Allow frontend running on localhost
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-True}
      
      # File Upload
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      ALLOWED_IMAGE_FORMATS: ${ALLOWED_IMAGE_FORMATS:-jpg,jpeg,png,webp}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      
      # Backup
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-5}
    
    volumes:
      - ./backend/app:/app/app:ro  # Mount backend code (read-only for safety)
      - ./storage:/app/storage
      - ./backend/logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - shg_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shg_network:
    driver: bridge
    name: shg_network

volumes:
  postgres_data:
    name: shg_postgres_data
