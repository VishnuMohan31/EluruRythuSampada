services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: farmers_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmers_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-farmers_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmers_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ../EluruRythuSampada_Shared_data/postgres:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"
    networks:
      - farmers_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmers_user} -d ${POSTGRES_DB:-farmers_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmers_backend
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: ${APP_NAME:-Eluru Rythu Sampada - Farmers Marketplace}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Server
      HOST: 0.0.0.0
      PORT: 8004
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmers_user}:${POSTGRES_PASSWORD:-farmers_password_123}@postgres:5432/${POSTGRES_DB:-farmers_marketplace}
      DB_ECHO: ${DB_ECHO:-False}
      
      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production-min-32-chars}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-180}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # AWS S3 (Optional)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-farmers-marketplace-images}
      S3_BUCKET_BACKUPS: ${S3_BUCKET_BACKUPS:-farmers-marketplace-backups}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      # Email (Optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@elururythusampada.gov.in}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Eluru Rythu Sampada}
      
      # CAPTCHA (Optional)
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-True}
      CONTACT_VENDOR_RATE_LIMIT: ${CONTACT_VENDOR_RATE_LIMIT:-10}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5}
      
      # CORS - Allow frontend container (development)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3004}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-True}
      
      # File Upload
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      ALLOWED_IMAGE_FORMATS: ${ALLOWED_IMAGE_FORMATS:-jpg,jpeg,png,webp}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      
      # Backup
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-5}
    
    volumes:
      - ./backend/app:/app/app:ro  # Mount backend code (read-only for safety)
      - ../EluruRythuSampada_Shared_data/storage:/app/storage
      - ../EluruRythuSampada_Shared_data/logs:/app/logs
      - ../EluruRythuSampada_Shared_data/backups:/app/backups
    ports:
      - "0.0.0.0:8004:8004"
    networks:
      - farmers_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8004}
    container_name: farmers_frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:3004:80"
    networks:
      - farmers_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  farmers_network:
    driver: bridge
    name: farmers_network
